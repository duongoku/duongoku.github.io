<!DOCTYPE html>
<html lang="en">
    <head>
        <script src="./../../assets/analytics.js"></script>
        <meta charset="utf-8" />
        <title>WFC</title>
        <style>
            #restart {
                display: block;
                margin-bottom: 0.5rem;
            }

            #upload {
                display: block;
                margin-bottom: 0.5rem;
            }

            #blocksize {
                display: block;
                margin-bottom: 0.5rem;
            }

            #canvas {
                border: 1px solid #000000;

        <input id="blocksize" type="text" value="32" />
        <canvas id="canvas" width="256" height="256"> </canvas>
        <script src="index.js"></script>
        <script src="event.js"></script>
    </body>
</html>
